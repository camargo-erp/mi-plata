<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mi Plata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0f;
  --card: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.07);
  --text: #e4e4e7;
  --text-dim: #71717a;
  --text-muted: #a1a1aa;
  --green: #22c55e;
  --green-dark: #16a34a;
  --red: #ef4444;
  --red-dark: #dc2626;
  --blue: #3b82f6;
  --orange: #f97316;
  --yellow: #eab308;
  --radius: 14px;
  --radius-sm: 10px;
}
html, body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
body { padding-bottom: env(safe-area-inset-bottom, 20px); }
.app { max-width: 460px; margin: 0 auto; padding: 20px 16px 100px; position: relative; min-height: 100dvh; }

/* Loading */
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; gap: 16px; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-dim); font-size: 14px; }

/* User Select */
.user-select { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; gap: 24px; }
.user-select h1 { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, var(--green), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.user-select p { color: var(--text-muted); font-size: 15px; }
.user-btns { display: flex; gap: 12px; width: 100%; max-width: 300px; }
.user-btn { flex: 1; padding: 20px 16px; border-radius: var(--radius); border: 1px solid var(--card-border); background: var(--card); color: var(--text); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px; font-family: inherit; }
.user-btn:active { transform: scale(0.96); }
.user-btn .emoji { font-size: 32px; }
.user-switch { position: absolute; top: 16px; right: 16px; background: var(--card); border: 1px solid var(--card-border); color: var(--text-dim); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; }

/* Header */
.main-title { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 20px; background: linear-gradient(135deg, var(--green), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn { background: none; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 4px 0; font-family: inherit; }
.page-title { font-size: 20px; font-weight: 700; }

/* Saldo Card */
.saldo-card { background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)); border-radius: 16px; padding: 24px 20px; text-align: center; border: 1px solid var(--card-border); margin-bottom: 20px; }
.saldo-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; }
.saldo-amount { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
.saldo-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
.saldo-sub .green { color: var(--green); }
.saldo-sub .red { color: var(--red); }
.medio-desglose { display: flex; align-items: center; margin-top: 12px; background: rgba(0,0,0,0.25); border-radius: var(--radius-sm); padding: 10px 0; }
.medio-item { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 14px; font-weight: 600; }
.medio-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

/* Action Buttons */
.action-row { display: flex; gap: 12px; margin-bottom: 24px; }
.action-btn { flex: 1; border: none; border-radius: var(--radius); padding: 18px 0; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; transition: transform 0.15s; font-family: inherit; }
.action-btn:active { transform: scale(0.96); }
.action-btn.ingreso { background: linear-gradient(135deg, var(--green), var(--green-dark)); }
.action-btn.egreso { background: linear-gradient(135deg, var(--red), var(--red-dark)); }
.action-btn .icon { font-size: 28px; }

/* Section */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.section-title { font-size: 15px; font-weight: 700; color: var(--text-muted); }
.ver-todo { background: none; border: none; color: var(--blue); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }

/* Movimiento Row */
.mov-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; margin-bottom: 8px; border-radius: 12px; background: var(--card); border: 1px solid var(--card-border); animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.mov-left { display: flex; align-items: center; gap: 10px; overflow: hidden; }
.mov-emoji { font-size: 22px; flex-shrink: 0; }
.mov-info { overflow: hidden; }
.mov-cat { font-size: 14px; font-weight: 600; }
.mov-desc { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.mov-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.mov-monto { font-size: 15px; font-weight: 700; }
.mov-monto.ingreso { color: var(--green); }
.mov-monto.egreso { color: var(--red); }
.mov-fecha { font-size: 11px; color: var(--text-dim); }
.mov-user-tag { font-size: 10px; color: var(--text-dim); background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px; }
.empty { text-align: center; padding: 32px 16px; color: var(--text-dim); font-size: 14px; line-height: 1.5; }

/* Form */
.form-card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--card-border); }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; display: block; margin-top: 16px; }
.form-label:first-child { margin-top: 0; }
.monto-wrap { display: flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 8px 14px; }
.monto-sign { font-size: 28px; font-weight: 700; color: var(--text-dim); }
.monto-input { background: none; border: none; outline: none; font-size: 32px; font-weight: 800; color: var(--text); width: 100%; font-family: inherit; }
.cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.cat-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 4px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: var(--text); cursor: pointer; transition: all 0.15s; font-family: inherit; }
.cat-btn:active { transform: scale(0.95); }
.cat-btn.selected-green { background: var(--green); color: #fff; border-color: transparent; }
.cat-btn.selected-red { background: var(--red); color: #fff; border-color: transparent; }
.cat-btn .cat-icon { font-size: 18px; }
.cat-btn .cat-name { font-size: 12px; }
.text-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 14px; outline: none; font-family: inherit; }
.custom-cat-input { margin-top: 8px; }
.medio-row { display: flex; gap: 8px; }
.medio-btn { flex: 1; padding: 10px 0; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center; font-family: inherit; }
.medio-btn.selected { background: var(--blue); color: #fff; border-color: transparent; }
.submit-btn { width: 100%; border: none; border-radius: 12px; padding: 14px 0; color: #fff; font-size: 16px; font-weight: 700; margin-top: 20px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.submit-btn:disabled { background: #555 !important; cursor: not-allowed; }
.submit-btn:active:not(:disabled) { transform: scale(0.98); }

/* Historial */
.mes-selector { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
.mes-btn { background: rgba(255,255,255,0.08); border: none; color: var(--text); font-size: 16px; width: 36px; height: 36px; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; }
.mes-label { font-size: 18px; font-weight: 700; min-width: 100px; text-align: center; }
.resumen-row { display: flex; gap: 10px; margin-bottom: 12px; }
.resumen-box { flex: 1; background: var(--card); border-radius: 12px; padding: 12px 14px; }
.resumen-box.green-border { border-left: 3px solid var(--green); }
.resumen-box.red-border { border-left: 3px solid var(--red); }
.resumen-box.blue-border { border-left: 3px solid var(--blue); }
.resumen-box.yellow-border { border-left: 3px solid var(--yellow); }
.resumen-label { font-size: 11px; color: var(--text-muted); }
.resumen-val { font-size: 18px; font-weight: 700; margin-top: 2px; }
.resumen-val.green { color: var(--green); }
.resumen-val.red { color: var(--red); }
.resumen-val.blue { color: var(--blue); }
.resumen-val.yellow { color: var(--yellow); }

/* Category Breakdown */
.cat-breakdown { margin-bottom: 24px; }
.cat-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.cat-row-left { display: flex; align-items: center; gap: 6px; min-width: 110px; }
.cat-row-name { font-size: 13px; font-weight: 600; }
.cat-bar-wrap { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
.cat-bar { height: 100%; background: linear-gradient(90deg, var(--red), var(--orange)); border-radius: 4px; transition: width 0.4s ease; }
.cat-row-monto { font-size: 13px; font-weight: 600; color: var(--red); min-width: 70px; text-align: right; }

/* Delete */
.delete-btn { background: none; border: none; color: var(--text-dim); font-size: 12px; cursor: pointer; padding: 2px 6px; opacity: 0.5; transition: opacity 0.15s; }
.delete-btn:hover { opacity: 1; }
.delete-confirm { display: flex; gap: 6px; margin-top: 4px; }
.delete-yes { background: var(--red); border: none; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-family: inherit; }
.delete-no { background: rgba(255,255,255,0.1); border: none; color: var(--text); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-family: inherit; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #18181b; color: var(--text); padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; border: 1px solid var(--card-border); animation: fadeIn 0.2s ease; z-index: 999; }

/* Sync */
.sync-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: var(--blue); animation: syncPulse 1s ease-in-out infinite; z-index: 1000; }
@keyframes syncPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
.sync-error { text-align: center; color: var(--red); font-size: 12px; padding: 8px; background: rgba(239,68,68,0.1); border-radius: 8px; margin-bottom: 12px; }

/* Saldo resumen card historial */
.saldo-resumen { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; }
.saldo-resumen-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
.saldo-resumen-label { font-size: 13px; color: var(--text-muted); }
.saldo-resumen-val { font-size: 14px; font-weight: 700; }
.saldo-resumen-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 6px 0; }
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxG-lfc9-rrPVUCdtUC_bzLC0Hk6D0sR4wbIFq-IeKGMPY2ZCjRb4IppCZjyt7hrfLhw/exec";

const USUARIOS = [
  { id: "hijo", nombre: "Matías", emoji: "🧑" },
  { id: "papa", nombre: "Martín", emoji: "👨" }
];

// ============================================================
// CATEGORÍAS — "Otro" siempre al final, abre campo custom
// ============================================================
const CATEGORIAS_INGRESO = ["Trabajo", "Boliche", "Otro"];
const CATEGORIAS_EGRESO = ["Comida", "Transporte", "Salidas", "Ropa", "Tech", "Juegos", "Suscripciones", "Ahorro", "Otro"];

const ICONOS = {
  Trabajo: "🔧", Boliche: "🎱",
  Comida: "🍔", Transporte: "🚌", Salidas: "🎉", Ropa: "👕",
  Tech: "📱", Juegos: "🎮", Suscripciones: "📺", Ahorro: "🏦", Otro: "📌"
};
const MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

// ============================================================
// STATE
// ============================================================
let state = {
  movimientos: [],
  loading: true,
  syncing: false,
  syncError: null,
  vista: "userSelect",
  usuario: localStorage.getItem("miplata_usuario") || null,
  tipo: null,
  form: { monto: "", categoria: "", categoriaCustom: "", medio: "efectivo", descripcion: "", fecha: todayStr() },
  filtroMes: new Date().getMonth(),
  filtroAnio: new Date().getFullYear(),
  toast: null,
  deleteConfirm: null,
  editingId: null
};

function todayStr() { return new Date().toISOString().split("T")[0]; }

function formatMoney(n) {
  return new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS", minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
}

function formatDate(d) {
  const date = new Date(d + "T12:00:00");
  return date.getDate() + " " + MESES[date.getMonth()];
}

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 2200);
}

// Categoría final: si eligió "Otro" usa el custom, sino la predefinida
function getCategoriaFinal() {
  if (state.form.categoria === "Otro" && state.form.categoriaCustom.trim()) {
    return state.form.categoriaCustom.trim();
  }
  return state.form.categoria;
}

// ============================================================
// API
// ============================================================
async function fetchMovimientos() {
  state.syncing = true;
  state.syncError = null;
  render();
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const json = await res.json();
    if (json.ok) {
      state.movimientos = json.data;
    } else {
      state.syncError = json.error || "Error al cargar";
    }
  } catch (e) {
    state.syncError = "Sin conexión";
  }
  state.syncing = false;
  state.loading = false;
  render();
}

async function apiPost(body) {
  state.syncing = true;
  render();
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.ok) {
      state.syncError = json.error;
      showToast("❌ Error: " + json.error);
    }
    return json;
  } catch (e) {
    state.syncError = "Sin conexión";
    showToast("❌ Sin conexión");
    return { ok: false };
  } finally {
    state.syncing = false;
  }
}

async function crearMovimiento() {
  const f = state.form;
  const catFinal = getCategoriaFinal();
  if (!f.monto || !catFinal) return;
  const result = await apiPost({
    action: "crear",
    fecha: f.fecha,
    tipo: state.tipo,
    monto: Math.abs(parseFloat(f.monto)),
    categoria: catFinal,
    medio: f.medio,
    descripcion: f.descripcion,
    usuario: state.usuario
  });
  if (result.ok) {
    showToast(state.tipo === "ingreso" ? "💰 Ingreso registrado" : "💸 Egreso registrado");
    resetForm();
    state.vista = "home";
    await fetchMovimientos();
  }
}

async function editarMovimiento() {
  const f = state.form;
  const catFinal = getCategoriaFinal();
  if (!f.monto || !catFinal) return;
  const result = await apiPost({
    action: "editar",
    id: state.editingId,
    fecha: f.fecha,
    tipo: state.tipo,
    monto: Math.abs(parseFloat(f.monto)),
    categoria: catFinal,
    medio: f.medio,
    descripcion: f.descripcion
  });
  if (result.ok) {
    showToast("✏️ Movimiento editado");
    resetForm();
    state.editingId = null;
    state.vista = "historial";
    await fetchMovimientos();
  }
}

async function borrarMovimiento(id) {
  const result = await apiPost({ action: "borrar", id: String(id) });
  if (result.ok) {
    showToast("🗑️ Eliminado");
    state.deleteConfirm = null;
    await fetchMovimientos();
  }
}

function resetForm() {
  state.form = { monto: "", categoria: "", categoriaCustom: "", medio: "efectivo", descripcion: "", fecha: todayStr() };
  state.tipo = null;
  state.editingId = null;
}

function startEdit(m) {
  state.editingId = m.id;
  state.tipo = m.tipo;
  // Determinar si la categoría es predefinida o custom
  const predefinidas = m.tipo === "ingreso" ? CATEGORIAS_INGRESO : CATEGORIAS_EGRESO;
  const esPredefinida = predefinidas.includes(m.categoria);
  state.form = {
    monto: String(m.monto),
    categoria: esPredefinida ? m.categoria : "Otro",
    categoriaCustom: esPredefinida ? "" : (m.categoria || ""),
    medio: m.medio || "efectivo",
    descripcion: m.descripcion || "",
    fecha: m.fecha
  };
  state.vista = "nuevo";
  render();
}

// ============================================================
// CÁLCULOS
// ============================================================
function calcSaldo(movs) {
  return movs.reduce((a, m) => m.tipo === "ingreso" ? a + m.monto : a - m.monto, 0);
}
function calcSaldoMedio(movs, medio) {
  return movs.filter(m => (m.medio || "efectivo") === medio)
    .reduce((a, m) => m.tipo === "ingreso" ? a + m.monto : a - m.monto, 0);
}
function filtrarMes(movs, mes, anio) {
  return movs.filter(m => {
    const d = new Date(m.fecha + "T12:00:00");
    return d.getMonth() === mes && d.getFullYear() === anio;
  });
}
function filtrarAntesDeMes(movs, mes, anio) {
  // Movimientos ANTERIORES al mes/año indicado
  const inicioMes = new Date(anio, mes, 1);
  return movs.filter(m => {
    const d = new Date(m.fecha + "T12:00:00");
    return d < inicioMes;
  });
}
function calcIngEgMes(movs, mes, anio) {
  const del_mes = filtrarMes(movs, mes, anio);
  return {
    ingresos: del_mes.filter(m => m.tipo === "ingreso").reduce((a, m) => a + m.monto, 0),
    egresos: del_mes.filter(m => m.tipo === "egreso").reduce((a, m) => a + m.monto, 0)
  };
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById("app");
  let html = "";
  if (state.syncing) html += '<div class="sync-bar"></div>';
  if (state.toast) html += `<div class="toast">${state.toast}</div>`;

  if (state.loading) {
    html += '<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Cargando...</div></div>';
    app.innerHTML = html;
    return;
  }

  if (state.vista === "userSelect") html += renderUserSelect();
  else if (state.vista === "nuevo") html += renderNuevo();
  else if (state.vista === "historial") html += renderHistorial();
  else html += renderHome();

  app.innerHTML = html;
  bindEvents();
}

function renderUserSelect() {
  let h = '<div class="user-select"><h1>Mi Plata</h1><p>¿Quién sos?</p><div class="user-btns">';
  USUARIOS.forEach(u => {
    h += `<button class="user-btn" data-user="${u.id}"><span class="emoji">${u.emoji}</span>${u.nombre}</button>`;
  });
  h += '</div></div>';
  return h;
}

function renderHome() {
  const saldo = calcSaldo(state.movimientos);
  const sEfectivo = calcSaldoMedio(state.movimientos, "efectivo");
  const sTransf = calcSaldoMedio(state.movimientos, "transferencia");
  const { ingresos, egresos } = calcIngEgMes(state.movimientos, new Date().getMonth(), new Date().getFullYear());
  const ahorroMesActual = ingresos - egresos;
  // Ahorro acumulado = saldo de todo lo anterior al mes actual
  const movsAnteriores = filtrarAntesDeMes(state.movimientos, new Date().getMonth(), new Date().getFullYear());
  const ahorroAcumulado = calcSaldo(movsAnteriores);
  const usuarioObj = USUARIOS.find(u => u.id === state.usuario);
  const nombre = usuarioObj ? usuarioObj.nombre : "";

  let h = `<button class="user-switch" data-action="switchUser">${usuarioObj ? usuarioObj.emoji : ""} ${nombre}</button>`;
  h += '<h1 class="main-title">Mi Plata</h1>';

  if (state.syncError) h += `<div class="sync-error">⚠️ ${state.syncError} <button data-action="retry" style="background:none;border:none;color:var(--blue);cursor:pointer;font-family:inherit;font-weight:600;">Reintentar</button></div>`;

  // Saldo
  h += '<div class="saldo-card">';
  h += '<div class="saldo-label">Saldo total</div>';
  h += `<div class="saldo-amount" style="color:${saldo >= 0 ? 'var(--green)' : 'var(--red)'}">${formatMoney(saldo)}</div>`;
  h += `<div class="saldo-sub"><span class="green">+${formatMoney(ingresos)} este mes</span> · <span class="red">−${formatMoney(egresos)}</span></div>`;
  h += '<div class="medio-desglose">';
  h += `<div class="medio-item"><span>💵</span><span style="color:${sEfectivo >= 0 ? 'var(--text-muted)' : 'var(--red)'}">${formatMoney(sEfectivo)}</span></div>`;
  h += '<div class="medio-divider"></div>';
  h += `<div class="medio-item"><span>📲</span><span style="color:${sTransf >= 0 ? 'var(--text-muted)' : 'var(--red)'}">${formatMoney(sTransf)}</span></div>`;
  h += '</div>';
  // Ahorro acumulado + este mes
  h += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);">';
  h += `<div style="display:flex;justify-content:space-between;align-items:center;">`;
  h += `<span style="font-size:12px;color:var(--text-muted);">🏦 Ahorro acumulado</span>`;
  h += `<span style="font-size:15px;font-weight:700;color:${ahorroAcumulado >= 0 ? 'var(--yellow)' : 'var(--red)'}">${formatMoney(ahorroAcumulado)}</span>`;
  h += '</div>';
  h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">`;
  h += `<span style="font-size:12px;color:var(--text-muted);">📈 Este mes</span>`;
  h += `<span style="font-size:13px;font-weight:600;color:${ahorroMesActual >= 0 ? 'var(--green)' : 'var(--red)'}">${ahorroMesActual >= 0 ? '+' : ''}${formatMoney(ahorroMesActual)}</span>`;
  h += '</div>';
  h += '</div>';
  h += '</div>';

  // Action buttons
  h += '<div class="action-row">';
  h += '<button class="action-btn ingreso" data-action="newIngreso"><span class="icon">+</span><span>Ingreso</span></button>';
  h += '<button class="action-btn egreso" data-action="newEgreso"><span class="icon">−</span><span>Egreso</span></button>';
  h += '</div>';

  // Últimos movimientos
  h += '<div class="section-header"><span class="section-title">Últimos movimientos</span><button class="ver-todo" data-action="historial">Ver todo →</button></div>';

  if (state.movimientos.length === 0) {
    h += '<div class="empty">Todavía no hay movimientos. ¡Arrancá cargando uno!</div>';
  } else {
    const ultimos = [...state.movimientos].sort((a, b) => {
      if (b.fecha !== a.fecha) return b.fecha > a.fecha ? 1 : -1;
      return String(b.id) > String(a.id) ? 1 : -1;
    }).slice(0, 6);
    ultimos.forEach(m => { h += renderMovRow(m, false); });
  }

  return h;
}

function renderNuevo() {
  const isEditing = !!state.editingId;
  const tipo = state.tipo;
  const cats = tipo === "ingreso" ? CATEGORIAS_INGRESO : CATEGORIAS_EGRESO;
  const f = state.form;
  const color = tipo === "ingreso" ? "var(--green)" : "var(--red)";

  let h = '<div class="page-header">';
  h += '<button class="back-btn" data-action="backHome">← Volver</button>';
  h += `<span class="page-title" style="color:${color}">${isEditing ? "✏️ Editar" : tipo === "ingreso" ? "💰 Nuevo Ingreso" : "💸 Nuevo Egreso"}</span>`;
  h += '</div>';

  h += '<div class="form-card">';

  // Monto
  h += '<label class="form-label">Monto</label>';
  h += `<div class="monto-wrap"><span class="monto-sign">$</span><input type="number" inputmode="numeric" placeholder="0" class="monto-input" id="montoInput" value="${f.monto}"></div>`;

  // Categoría
  h += '<label class="form-label">Categoría</label>';
  h += '<div class="cat-grid">';
  cats.forEach(c => {
    const sel = f.categoria === c ? (tipo === "ingreso" ? "selected-green" : "selected-red") : "";
    h += `<button class="cat-btn ${sel}" data-cat="${c}"><span class="cat-icon">${ICONOS[c] || "📌"}</span><span class="cat-name">${c}</span></button>`;
  });
  h += '</div>';

  // Campo custom si eligió "Otro"
  if (f.categoria === "Otro") {
    h += `<input type="text" placeholder="Escribí la categoría..." class="text-input custom-cat-input" id="customCatInput" value="${f.categoriaCustom}">`;
  }

  // Descripción
  h += '<label class="form-label">Descripción (opcional)</label>';
  h += `<input type="text" placeholder="Ej: Almuerzo con amigos" class="text-input" id="descInput" value="${f.descripcion}">`;

  // Fecha
  h += '<label class="form-label">Fecha</label>';
  h += `<input type="date" class="text-input" id="fechaInput" value="${f.fecha}">`;

  // Medio
  h += '<label class="form-label">Medio de pago</label>';
  h += '<div class="medio-row">';
  h += `<button class="medio-btn ${f.medio === 'efectivo' ? 'selected' : ''}" data-medio="efectivo">💵 Efectivo</button>`;
  h += `<button class="medio-btn ${f.medio === 'transferencia' ? 'selected' : ''}" data-medio="transferencia">📲 Transferencia</button>`;
  h += '</div>';

  // Submit
  const catFinal = getCategoriaFinal();
  const disabled = !f.monto || !catFinal;
  const bgColor = disabled ? "#555" : (tipo === "ingreso" ? "var(--green)" : "var(--red)");
  h += `<button class="submit-btn" data-action="submit" ${disabled ? 'disabled' : ''} style="background:${bgColor}">${isEditing ? 'Guardar cambios' : 'Guardar'}</button>`;

  h += '</div>';
  return h;
}

function renderHistorial() {
  const { ingresos, egresos } = calcIngEgMes(state.movimientos, state.filtroMes, state.filtroAnio);

  // Saldo inicio = suma de todo lo anterior al mes
  const movsAnteriores = filtrarAntesDeMes(state.movimientos, state.filtroMes, state.filtroAnio);
  const saldoInicio = calcSaldo(movsAnteriores);
  const saldoFinal = saldoInicio + ingresos - egresos;
  const ahorro = ingresos - egresos;

  const movsFiltrados = filtrarMes(state.movimientos, state.filtroMes, state.filtroAnio)
    .sort((a, b) => {
      if (b.fecha !== a.fecha) return b.fecha > a.fecha ? 1 : -1;
      return String(b.id) > String(a.id) ? 1 : -1;
    });

  // Gastos por categoría
  const gastosPorCat = {};
  movsFiltrados.filter(m => m.tipo === "egreso").forEach(m => {
    gastosPorCat[m.categoria] = (gastosPorCat[m.categoria] || 0) + m.monto;
  });
  const catOrdenadas = Object.entries(gastosPorCat).sort((a, b) => b[1] - a[1]);
  const maxCat = catOrdenadas.length > 0 ? catOrdenadas[0][1] : 1;

  let h = '<div class="page-header">';
  h += '<button class="back-btn" data-action="backHome">← Volver</button>';
  h += '<span class="page-title">📋 Historial</span>';
  h += '</div>';

  // Mes selector
  h += '<div class="mes-selector">';
  h += '<button class="mes-btn" data-action="prevMes">◀</button>';
  h += `<span class="mes-label">${MESES[state.filtroMes]} ${state.filtroAnio}</span>`;
  h += '<button class="mes-btn" data-action="nextMes">▶</button>';
  h += '</div>';

  // Resumen ingresos / egresos
  h += '<div class="resumen-row">';
  h += `<div class="resumen-box green-border"><div class="resumen-label">Ingresos</div><div class="resumen-val green">${formatMoney(ingresos)}</div></div>`;
  h += `<div class="resumen-box red-border"><div class="resumen-label">Egresos</div><div class="resumen-val red">${formatMoney(egresos)}</div></div>`;
  h += '</div>';

  // Saldo inicio / final / ahorro
  h += '<div class="saldo-resumen">';
  h += `<div class="saldo-resumen-row"><span class="saldo-resumen-label">Saldo inicio de mes</span><span class="saldo-resumen-val" style="color:${saldoInicio >= 0 ? 'var(--text-muted)' : 'var(--red)'}">${formatMoney(saldoInicio)}</span></div>`;
  h += '<div class="saldo-resumen-divider"></div>';
  h += `<div class="saldo-resumen-row"><span class="saldo-resumen-label">Saldo fin de mes</span><span class="saldo-resumen-val" style="color:${saldoFinal >= 0 ? 'var(--blue)' : 'var(--red)'}">${formatMoney(saldoFinal)}</span></div>`;
  h += '<div class="saldo-resumen-divider"></div>';
  h += `<div class="saldo-resumen-row"><span class="saldo-resumen-label">💰 Ahorro del mes</span><span class="saldo-resumen-val" style="color:${ahorro >= 0 ? 'var(--green)' : 'var(--red)'}; font-size:16px;">${ahorro >= 0 ? '+' : ''}${formatMoney(ahorro)}</span></div>`;
  h += '<div class="saldo-resumen-divider"></div>';
  h += `<div class="saldo-resumen-row"><span class="saldo-resumen-label">🏦 Ahorro acumulado hasta ${MESES[state.filtroMes]}</span><span class="saldo-resumen-val" style="color:${saldoFinal >= 0 ? 'var(--yellow)' : 'var(--red)'}; font-size:16px;">${formatMoney(saldoFinal)}</span></div>`;
  h += '</div>';

  // Cat breakdown
  if (catOrdenadas.length > 0) {
    h += '<div class="cat-breakdown"><div class="section-title">Gastos por categoría</div>';
    catOrdenadas.forEach(([cat, monto]) => {
      const pct = (monto / maxCat) * 100;
      h += '<div class="cat-row">';
      h += `<div class="cat-row-left"><span>${ICONOS[cat] || "📌"}</span><span class="cat-row-name">${cat}</span></div>`;
      h += `<div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%"></div></div>`;
      h += `<span class="cat-row-monto">${formatMoney(monto)}</span>`;
      h += '</div>';
    });
    h += '</div>';
  }

  // Movimientos
  h += '<div class="section-title">Movimientos</div>';
  if (movsFiltrados.length === 0) {
    h += '<div class="empty">Sin movimientos este mes</div>';
  }
  movsFiltrados.forEach(m => { h += renderMovRow(m, true); });

  return h;
}

function renderMovRow(m, showActions) {
  const medioIcon = (m.medio || "efectivo") === "transferencia" ? "📲" : "💵";
  const usuarioObj = USUARIOS.find(u => u.id === m.usuario);
  const userTag = usuarioObj ? usuarioObj.nombre : (m.usuario || "");

  let h = '<div class="mov-row">';
  h += '<div class="mov-left">';
  h += `<span class="mov-emoji">${ICONOS[m.categoria] || "📌"}</span>`;
  h += '<div class="mov-info">';
  h += `<div class="mov-cat">${m.categoria}</div>`;
  h += `<div class="mov-desc">${medioIcon} ${m.descripcion || "—"}</div>`;
  h += '</div></div>';
  h += '<div class="mov-right">';
  h += `<div class="mov-monto ${m.tipo}">${m.tipo === "ingreso" ? "+" : "−"}${formatMoney(m.monto)}</div>`;
  h += `<div class="mov-fecha">${formatDate(m.fecha)}${userTag ? ' · <span class="mov-user-tag">' + userTag + '</span>' : ''}</div>`;

  if (showActions) {
    if (state.deleteConfirm === m.id) {
      h += '<div class="delete-confirm">';
      h += `<button class="delete-yes" data-delete="${m.id}">Borrar</button>`;
      h += '<button class="delete-no" data-action="cancelDelete">No</button>';
      h += '</div>';
    } else {
      h += '<div style="display:flex;gap:4px;margin-top:2px;">';
      h += `<button class="delete-btn" data-edit="${m.id}" title="Editar">✏️</button>`;
      h += `<button class="delete-btn" data-confirm-delete="${m.id}" title="Borrar">✕</button>`;
      h += '</div>';
    }
  }

  h += '</div></div>';
  return h;
}

// ============================================================
// EVENT BINDING
// ============================================================
function bindEvents() {
  // User select
  document.querySelectorAll("[data-user]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.usuario = btn.dataset.user;
      localStorage.setItem("miplata_usuario", state.usuario);
      state.vista = "home";
      state.loading = true;
      render();
      fetchMovimientos();
    });
  });

  // Actions
  document.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", () => {
      const action = el.dataset.action;
      if (action === "switchUser") {
        state.vista = "userSelect";
        state.usuario = null;
        localStorage.removeItem("miplata_usuario");
        render();
      } else if (action === "newIngreso") {
        resetForm();
        state.tipo = "ingreso";
        state.vista = "nuevo";
        render();
        document.getElementById("montoInput")?.focus();
      } else if (action === "newEgreso") {
        resetForm();
        state.tipo = "egreso";
        state.vista = "nuevo";
        render();
        document.getElementById("montoInput")?.focus();
      } else if (action === "historial") {
        state.vista = "historial";
        render();
      } else if (action === "backHome") {
        if (state.editingId) {
          state.vista = "historial";
          state.editingId = null;
        } else {
          state.vista = "home";
        }
        resetForm();
        render();
      } else if (action === "prevMes") {
        if (state.filtroMes === 0) { state.filtroMes = 11; state.filtroAnio--; }
        else state.filtroMes--;
        render();
      } else if (action === "nextMes") {
        if (state.filtroMes === 11) { state.filtroMes = 0; state.filtroAnio++; }
        else state.filtroMes++;
        render();
      } else if (action === "submit") {
        if (state.editingId) editarMovimiento();
        else crearMovimiento();
      } else if (action === "cancelDelete") {
        state.deleteConfirm = null;
        render();
      } else if (action === "retry") {
        fetchMovimientos();
      }
    });
  });

  // Category buttons
  document.querySelectorAll("[data-cat]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.form.categoria = btn.dataset.cat;
      if (btn.dataset.cat !== "Otro") state.form.categoriaCustom = "";
      render();
      // Focus custom input si eligió Otro
      if (btn.dataset.cat === "Otro") {
        setTimeout(() => document.getElementById("customCatInput")?.focus(), 50);
      }
    });
  });

  // Custom category input
  const customCatInput = document.getElementById("customCatInput");
  if (customCatInput) customCatInput.addEventListener("input", (e) => { state.form.categoriaCustom = e.target.value; });

  // Medio buttons
  document.querySelectorAll("[data-medio]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.form.medio = btn.dataset.medio;
      render();
    });
  });

  // Form inputs
  const montoInput = document.getElementById("montoInput");
  if (montoInput) montoInput.addEventListener("input", (e) => { state.form.monto = e.target.value; });
  const descInput = document.getElementById("descInput");
  if (descInput) descInput.addEventListener("input", (e) => { state.form.descripcion = e.target.value; });
  const fechaInput = document.getElementById("fechaInput");
  if (fechaInput) fechaInput.addEventListener("change", (e) => { state.form.fecha = e.target.value; });

  // Delete
  document.querySelectorAll("[data-confirm-delete]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.deleteConfirm = btn.dataset.confirmDelete;
      render();
    });
  });
  document.querySelectorAll("[data-delete]").forEach(btn => {
    btn.addEventListener("click", () => { borrarMovimiento(btn.dataset.delete); });
  });

  // Edit
  document.querySelectorAll("[data-edit]").forEach(btn => {
    btn.addEventListener("click", () => {
      const m = state.movimientos.find(x => String(x.id) === btn.dataset.edit);
      if (m) startEdit(m);
    });
  });
}

// ============================================================
// INIT
// ============================================================
if (state.usuario) {
  state.vista = "home";
  render();
  fetchMovimientos();
} else {
  state.loading = false;
  render();
}
</script>

</html>
